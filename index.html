<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AESPL — CEO Business Tracker</title>
  <meta name="description" content="AESPL Electronics Manufacturing — Complete Business Operations Tracker"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/dexie@4.0.11/dist/dexie.min.js"></script>
  <script src="https://unpkg.com/dexie-export-import@4.1.2/dist/dexie-export-import.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="app"></div>

  <!-- Command Palette -->
  <div id="cmd-palette-overlay" class="cmd-palette-overlay hidden">
    <div class="cmd-palette">
      <input type="text" id="cmd-input" class="cmd-palette-input" placeholder="Type a department or action... (Esc to close)" autocomplete="off">
      <div id="cmd-results" class="cmd-results"></div>
      <div class="cmd-palette-footer">
        <span>↑↓ to Navigate</span> <span>↵ to Select</span> <span>ESC to Close/Back</span>
      </div>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close" class="modal-close-btn">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div id="modal-footer" class="modal-footer"></div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <!-- Frameworks & Core -->
  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/sync.js"></script>

  <!-- Page Modules (Must be loaded before app.js) -->
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/entrybook.js"></script>
  <script src="js/pages/masters.js"></script>
  <script src="js/pages/products.js"></script>
  <script src="js/pages/sales.js"></script>
  <script src="js/pages/purchase.js"></script>
  <script src="js/pages/bank.js"></script>
  <script src="js/pages/finance.js"></script>
  <script src="js/pages/operations.js"></script>
  <script src="js/pages/extras.js"></script>

  <!-- Main App -->
  <script src="js/app.js"></script>
</body>
</html>
